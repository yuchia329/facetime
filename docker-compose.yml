version: '3.9'

services:
  server:
    image: yuchia329/hubstream-server:1 # Use your manually built image
    container_name: hubstream-server
    security_opt:
      - seccomp:unconfined
    ports:
      - '4000:4000'
      - '40000-40099:40000-40099/udp'
    environment:
      - NODE_ENV=production
      - PORT=4000
      - MEDIASOUP_LISTEN_IP=0.0.0.0
      - MEDIASOUP_ANNOUNCED_IP=${MEDIASOUP_ANNOUNCED_IP:-127.0.0.1}
      - CLIENT_ORIGIN=http://localhost:3000
    restart: unless-stopped
    networks:
      - hubstream-net

  client:
    image: yuchia329/hubstream-client:1 # Use your manually built image
    container_name: hubstream-client
    ports:
      - '3000:3000'
    environment:
      - BACKEND_URL=http://server:4000
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - hubstream-net

networks:
  hubstream-net:
    driver: bridge
