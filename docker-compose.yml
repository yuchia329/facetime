version: '3.9'

services:
  server:
    image: yuchia329/facetime-server:1 # Use your manually built image
    container_name: facetime-server
    ports:
      - '4000:4000'
      - '40000-40099:40000-40099/udp'
    environment:
      - NODE_ENV=production
      - PORT=4000
      - MEDIASOUP_LISTEN_IP=0.0.0.0
      - MEDIASOUP_ANNOUNCED_IP=127.0.0.1
      - CLIENT_ORIGIN=http://localhost:3000
    restart: unless-stopped
    networks:
      - facetime-net

  client:
    image: yuchia329/facetime-client:1 # Use your manually built image
    container_name: facetime-client
    ports:
      - '3000:3000'
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - facetime-net

networks:
  facetime-net:
    driver: bridge
