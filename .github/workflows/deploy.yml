name: Continuous Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Required for AWS OIDC authentication
permissions:
  id-token: write 
  contents: read

jobs:
  build-and-deploy:
    name: Build (ARM), Push, and Deploy via SSM
    runs-on: ubuntu-24.04-arm

    environment: Prod
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. & 2. Set up multi-architecture build environment
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Authenticate with Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Build and push the Client ARM64 image
      - name: Build, tag, and push Client image
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build --platform linux/arm64 \
            --build-arg NEXT_PUBLIC_WS_URL=wss://app.yuchia.dev:8443/ws \
            --push -t $DOCKERHUB_USERNAME/facetime-client:$IMAGE_TAG ./client

      # 5. Build and push the Server ARM64 image
      - name: Build, tag, and push Server image
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build --platform linux/arm64 \
            --push -t $DOCKERHUB_USERNAME/facetime-server:$IMAGE_TAG ./server

      # 5. Authenticate with AWS using OIDC (No static credentials)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::554771082581:role/facetime-github-actions-deploy-role
          aws-region: us-east-1

      # 6. Execute deployment commands via AWS Systems Manager
      - name: Deploy to EC2 via SSM Run Command
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ github.sha }}
          # Ensure this matches the Name tag generated by your Terraform script
          EC2_TAG_NAME: facetime-server 
        run: |
          echo "Looking up running EC2 instance with tag Name=$EC2_TAG_NAME..."
          
          # Dynamically fetch the Instance ID
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=$EC2_TAG_NAME" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          # Fail the build early if the instance isn't found or isn't running
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" == "None" ]; then
            echo "Error: Could not find a running EC2 instance with tag Name=$EC2_TAG_NAME"
            exit 1
          fi

          echo "Found Target Instance: $INSTANCE_ID"

          # Send the deployment commands to the EC2 instance securely
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploying $IMAGE_TAG" \
            --parameters commands=[ \
              "cd /opt/facetime", \
              "sed -i 's|^CLIENT_IMAGE=.*|CLIENT_IMAGE=$DOCKERHUB_USERNAME/facetime-client:$IMAGE_TAG|' .env.prod", \
              "sed -i 's|^SERVER_IMAGE=.*|SERVER_IMAGE=$DOCKERHUB_USERNAME/facetime-server:$IMAGE_TAG|' .env.prod", \
              "sudo docker compose -f docker-compose.prod.yml --env-file .env.prod pull", \
              "sudo docker compose -f docker-compose.prod.yml --env-file .env.prod up -d" \
            ] \
            --query "Command.CommandId" \
            --output text)
            
          echo "Dispatched SSM Command ID: $COMMAND_ID"
          
          # Wait for the command to finish so GitHub Actions knows if it passed or failed
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"